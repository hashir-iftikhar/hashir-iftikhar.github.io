<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="easter.css" rel="stylesheet">
        <title>Easter Egg</title>
        <script>
document.addEventListener("DOMContentLoaded", function() {

    let spotlight = document.querySelector(".cursor-glow");

    document.addEventListener("mousemove", (e) => {
        spotlight.style.left = e.clientX + "px";
        spotlight.style.top = e.clientY + "px";
    });


    function typeEffect(elementId, text, speed = 1000) {
        const el = document.getElementById(elementId);
        let i = 0;

        function type() {
            el.textContent = text.slice(0, i++);

            if (i <= text.length) {
                setTimeout(type, speed);
            } else {
                i = 0;
                setTimeout(type, 1000);
            }
        }

        type();
    }


    typeEffect("typing", "This is Hashir", 500);
    typeEffect("typing2", "Thanks for finding this page", 300);
    typeEffect("typing3", "You seem curious", 300);

});

</script>
    </head>
    <body>
        <div class = "cursor-glow"></div>
        <div class = "top"><h1 id="typing"></h1></div>
        <div class = "bottom"><h2 id="typing2"></h2></div>
        <div class = "bottom"><h2 id="typing3"></h2></div>
        <a href="index.html" class="back-btn">← Back to Home</a>
</body>
</html>
